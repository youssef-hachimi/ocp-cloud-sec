###############################################################################
# NGINX REVERSE PROXY - Wazuh Dashboard with Custom Domain
# Cloud Security Project - Phase 3
#
# This configuration sets up nginx as a reverse proxy in front of Wazuh Dashboard
# to enable custom domain access with SSL termination.
#
# Install: sudo cp wazuh-dashboard-proxy.conf /etc/nginx/sites-available/wazuh
#          sudo ln -s /etc/nginx/sites-available/wazuh /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
###############################################################################

# Upstream Wazuh Dashboard
upstream wazuh_dashboard {
    server 127.0.0.1:5601;  # Wazuh Dashboard default port
    keepalive 32;
}

# HTTP to HTTPS redirect
server {
    listen 80;
    server_name wazuh.yourdomain.com;  # CHANGE TO YOUR DOMAIN
    
    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS Server - Wazuh Dashboard
server {
    listen 443 ssl http2;
    server_name wazuh.yourdomain.com;  # CHANGE TO YOUR DOMAIN
    
    # SSL Certificates (Let's Encrypt or purchased)
    ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    
    # SSL Configuration (A+ rating)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    
    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    
    # Client limits
    client_max_body_size 50M;
    client_body_buffer_size 16k;
    
    # IP Whitelist - Restrict Wazuh Dashboard Access
    # Uncomment and configure to restrict access to specific IPs
    # allow 192.168.1.0/24;      # Your office/home network
    # allow 10.0.0.0/8;           # Azure VNet
    # deny all;                   # Deny everyone else
    
    # Rate limiting
    limit_req_zone $binary_remote_addr zone=wazuh_limit:10m rate=10r/s;
    limit_req zone=wazuh_limit burst=20 nodelay;
    
    # Logging
    access_log /var/log/nginx/wazuh-access.log;
    error_log /var/log/nginx/wazuh-error.log;
    
    # Proxy to Wazuh Dashboard
    location / {
        proxy_pass http://wazuh_dashboard;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }
    
    # WebSocket support (for Wazuh real-time features)
    location /socket.io/ {
        proxy_pass http://wazuh_dashboard;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
